spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/int216d_carwash}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
  kafka:
    listener:
      auto-startup: false
  mail:
    host: localhost
    port: 1025

logging:
  level:
    za.co.int216d: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
