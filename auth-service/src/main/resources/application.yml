server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/int216d_carwash}
    username: ${DB_USER:dev}
    password: ${DB_PASSWORD:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth_schema
        jdbc.time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    schemas: auth_schema
    default-schema: auth_schema
    locations: classpath:db/migration
    create-schemas: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:true}

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_MIN_32_BYTES}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  issuer: int216d-auth

app:
  mail:
    project-name: ${MAIL_PROJECT_NAME:INT216D Smart Car Wash}
    from-name: ${MAIL_FROM_NAME:INT216D Smart Car Wash}
    from-address: ${MAIL_FROM_ADDRESS:noreply@int216d.co.za}
  otp:
    length: 6
    ttl-minutes: 10
  cookie:
    refresh-name: int216d_refresh
    secure: ${COOKIE_SECURE:false}
    same-site: Lax
    path: /api/v1/auth

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    za.co.int216d: INFO
